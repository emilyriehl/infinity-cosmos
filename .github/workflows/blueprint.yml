name: Compile blueprint

on:
  push:
    branches:
      - main
    paths:
      - '**/*.lean'
      - '.github/workflows/blueprint.yml'
      - 'blueprint/**'
      - 'home_page/**'
      - 'scripts/ci-pages.sh'
      - 'lean-toolchain'
      - 'lakefile.toml'
      - 'lake-manifest.json'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.lean'
      - '.github/workflows/blueprint.yml'
      - 'blueprint/**'
      - 'home_page/**'
      - 'scripts/ci-pages.sh'
      - 'lean-toolchain'
      - 'lakefile.toml'
      - 'lake-manifest.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_project:
    runs-on: ubuntu-latest
    name: Build project and documentation
    steps:
      - name: Checkout project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Build the project
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          use-github-cache: false

      - name: Install TeX for the blueprint PDF
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dvisvgm \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-luatex \
            texlive-pictures

      - name: Build Verso blueprint
        run: ./scripts/ci-pages.sh

      - name: Stage blueprint with the project homepage
        if: github.event_name == 'push'
        run: |
          rm -rf home_page/blueprint
          cp -R _out/site/html-multi home_page/blueprint
          cp _out/site/pdf/main.pdf home_page/blueprint.pdf

      - name: Compile project documentation and deploy the combined site
        uses: leanprover-community/docgen-action@cc833d262c7b8f179ac444cd20fde412b24b8beb # 2026-01-08
        with:
          blueprint: false
          homepage: home_page
